<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Do You Love Me? ❤️</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #fff5f5;
            padding-top: 60px;
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 10px;
        }

        img {
            max-width: 300px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <h1>Do You Love Me? ❤️</h1>

    <button id="yesBtn">YES ❤️</button>
    <button onclick="page1()">NO 💔</button>

    <script>

        function makeButtonRun(button) {

            button.addEventListener("mouseover", () => {

                const x = Math.random() * (window.innerWidth - 150);
                const y = Math.random() * (window.innerHeight - 100);

                button.style.position = "absolute";
                button.style.left = x + "px";
                button.style.top = y + "px";
            });
        }

        makeButtonRun(document.getElementById("yesBtn"));



        // PAGE 1
        function page1() {

            document.body.innerHTML = `
                <img src="cat.png">

                <h1>Kitni buri ho tum 😭</h1>

                <h2>You betrayed my heart 💔</h2>

                <br>

                <h3>Chalo ek mauka phirse deta hu 🥲</h3>

                <h2>Do you love me? 😭😭</h2>

                <button id="yesBtn2">YES ❤️</button>

                <button onclick="page2()">NO 💔</button>
            `;

            makeButtonRun(document.getElementById("yesBtn2"));
        }



        // PAGE 2
        function page2() {

            document.body.innerHTML = `
                <img src="us.png">

                <h2 style="margin-top:20px;">
                    Thik hai bhai AI hai na ye 🥲
                </h2>

                <h3>
                    Last Warning ⚠️ Tap YES
                </h3>

                <button onclick="finalPage()">YES ❤️</button>

                <button disabled>NO ❌</button>
            `;
        }



        // FINAL PAGE
        function finalPage() {

            document.body.innerHTML = `
                <img src="cat3.png">

                <h1 style="margin-top:20px;">
                    Kabhi galti se yaad aati ho toh CALL kr diya kro ☎️
                </h1>

                <h3>
                    Mujhe bhi mann hota hai baat krne ka 🥲
                </h3>

                <h3>
                    But topics nhi hote mere paas...
                </h3>

                <h2>
                    Baat kis topic pe karni hai vo tum decide kar lena ❤️
                </h2>
            `;
        }

    </script>

</body>

</html>
